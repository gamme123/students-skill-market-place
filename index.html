<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillSwap - Student Skill Marketplace</title>
    <meta name="description" content="Buy and sell student services — web development, design, tutoring, and more. Affordable, peer-powered, campus-ready." />
    <meta name="author" content="SkillSwap" />

    <meta property="og:title" content="SkillSwap - Student Skill Marketplace" />
    <meta property="og:description" content="Buy and sell student services — web development, design, tutoring, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/student-market-icon.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/student-market-icon.svg" />
    <script>
      (function () {
        const redirect = window.location.search.match(/[?&]p=([^&]*)/);
        if (!redirect) return;

        const route = decodeURIComponent(redirect[1]).replace(/~and~/g, "&");
        const query = window.location.search
          .replace(/^\?/, "")
          .split("&")
          .filter((part) => part && !part.startsWith("p="))
          .join("&");
        const hash = window.location.hash || "";
        const url = route + (query ? `?${query}` : "") + hash;

        window.history.replaceState(null, "", url);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
